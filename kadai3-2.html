<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="urf-8">
        <title>演習課題3-2</title>
    </head>
    <body>
        <script>
            function sum(a) { // 引数は配列
                let total = 0; // 合計値の計算用
                for (let i=0;i<a.length;i++) {
                    total = total + a[i];
                }
                // 配列を参照して合計値を計算する処理
                return total;  // 戻り値はtotal
            }
            
            let b = [10, 8, 14, 15];
            let answer = sum(b);
            console.log(answer); // 合計値を計算し表示する処理
        </script>
    </body>
</html>
